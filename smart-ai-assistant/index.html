<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Multi-AI Assistant — AI-powered task management system">
  <title>Smart Multi-AI Assistant</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
  <!-- App root — Router renders into this div -->
  <div id="app">
    <!-- Loading state while JS initialises -->
    <div style="
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:18px;
      background:var(--bg); color:var(--muted); font-family:'DM Sans',sans-serif;
    ">
      <div style="
        width:72px; height:72px; border-radius:20px;
        background:linear-gradient(135deg,#5b7cfa,#a78bfa);
        display:flex; align-items:center; justify-content:center;
        font-size:32px; animation:pulse 1.5s ease-in-out infinite;
      ">🤖</div>
      <p style="font-size:14px; letter-spacing:0.08em; text-transform:uppercase;">Loading Smart AI…</p>
    </div>
  </div>

  <style>
    @keyframes pulse {
      0%,100% { transform:scale(1);   opacity:1; }
      50%      { transform:scale(1.08); opacity:0.8; }
    }
  </style>

  <!-- Main application script -->
  <script src="js/app.js"></script>
</body>
</html>
